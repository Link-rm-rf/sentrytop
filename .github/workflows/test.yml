name: SentryTop CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ created ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install rich psutil pexpect

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Check Makefile Existence & Compile C Collector
      run: |
        if [ -f "collector/Makefile" ]; then
          cd collector
          make clean
          make all
        else
          echo "No C Collector Makefile found (assuming mock structure), skipping compilation."
        fi

    - name: Run Maven Tests (Java Correlator)
      run: |
        if [ -f "engine/pom.xml" ]; then
          cd engine
          mvn test
        else
          echo "No pom.xml found (assuming mock structure), skipping Maven tests."
        fi

    - name: Run Python Integration Tests (TUI Mock Data)
      run: |
        export NOSUDO=1
        if [ -f "test_cli.py" ]; then
          python test_cli.py
        else
          echo "No test_cli.py found in root, skipping."
        fi

    - name: Run Python Integration Tests (Live Subprocess Pipe)
      run: |
        export NOSUDO=1
        if [ -f "test_integration.py" ]; then
          python test_integration.py
        else
          echo "No test_integration.py found in root, skipping."
        fi

    - name: Code Quality & Linting
      run: |
        pip install flake8 mypy
        flake8 sentrytop_cli.py --count --select=E9,F63,F7,F82 --show-source --statistics || true

  release-binaries:
    needs: build-and-test
    if: github.event_name == 'release' && github.event.action == 'created'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Package SentryTop Archive
      run: |
        mkdir -p release/sentrytop
        cp -r scripts sentrytop_cli.py requirements.txt release/sentrytop/
        # Include compiled collector and engine if they exist
        [ -f "collector/sentrytop-collector" ] && cp collector/sentrytop-collector release/sentrytop/ || true
        [ -d "engine/target" ] && cp engine/target/*.jar release/sentrytop/ || true
        tar -czvf sentrytop-linux-amd64.tar.gz -C release sentrytop
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./sentrytop-linux-amd64.tar.gz
        asset_name: sentrytop-linux-amd64.tar.gz
        asset_content_type: application/gzip
